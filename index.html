<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教室預約與實時動態系統</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --palette-teal: #0d9488;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 15px;
            color: var(--text-dark);
            border-bottom: 2px solid var(--border);
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 15px;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text-dark);
        }

        input[type="text"], input[type="date"], input[type="time"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            background-color: #fff;
        }

        /* 自訂選單 UI 與滾動卡頓修復 */
        .custom-dropdown-btn {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #fff;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .custom-dropdown-menu {
            position: fixed;
            width: 280px;
            max-height: 300px; /* 設定最大高度 300px */
            overflow-y: auto;
            overscroll-behavior: contain; /* 關鍵修復：防止滾動傳遞至背景 */
            background: var(--white);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 9999;
            display: none;
            padding: 6px 0;
        }

        .custom-dropdown-menu.show {
            display: block;
        }

        .dropdown-item {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .dropdown-item:hover {
            background-color: #f1f5f9;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            margin-top: 5px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
            font-weight: normal;
            cursor: pointer;
            background: #f1f5f9;
            padding: 6px 8px;
            border-radius: 4px;
        }

        .checkbox-label input {
            cursor: pointer;
        }

        button.btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button.btn-submit:hover {
            background: var(--primary-hover);
        }

        /* 教室地圖看板樣式 */
        .map-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 15px;
        }

        .room-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            background: #fff;
            transition: all 0.3s ease;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .room-card.span-vertical {
            grid-row: span 2;
        }

        .room-card .room-name {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 4px;
            text-align: center;
        }

        /* 綠燈：空堂 */
        .room-card.available {
            background-color: #f0fdf4;
            border-color: #bbf7d0;
        }
        .room-card.available .status-badge {
            background-color: #22c55e;
            color: white;
        }

        /* 紅燈：使用中 / 準備中 / 連堂中 */
        .room-card.occupied {
            background-color: #fef2f2;
            border-color: #fecaca;
        }
        .room-card.occupied .status-badge {
            background-color: #ef4444;
            color: white;
        }

        /* 🟠 橘燈：收拾中 */
        .room-card.clearing {
            background-color: #fff7ed;
            border-color: #fdba74;
        }
        .room-card.clearing .status-badge {
            background-color: #f97316;
            color: white;
        }

        /* 💡 呼吸燈閃爍動畫：交接中 (不同老師) */
        @keyframes badgePulse {
            0% {
                opacity: 1;
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }
            50% {
                opacity: 0.5;
                transform: scale(1.05);
                box-shadow: 0 0 8px 4px rgba(239, 68, 68, 0.4);
            }
            100% {
                opacity: 1;
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }
        }

        .status-badge.badge-flashing {
            animation: badgePulse 1.2s infinite ease-in-out !important;
            background-color: #ef4444 !important;
            color: white !important;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 左側：預約表單 -->
    <div class="panel">
        <h2>線上教室登記預約</h2>
        <form id="bookingForm">
            <div class="form-group">
                <label>借用人姓名</label>
                <!-- 電腦版自訂下拉選單 -->
                <div id="desktopBorrowerContainer" class="desktop-only">
                    <button type="button" class="custom-dropdown-btn" id="customDropdownBtn">
                        <span id="customDropdownText" style="color: #94a3b8;">請選擇借用人姓名</span>
                        <span>▼</span>
                    </button>
                    <div class="custom-dropdown-menu" id="customDropdownMenu"></div>
                </div>

                <!-- 手機版原生選單 -->
                <select id="borrowerSelect" class="mobile-only" style="display: none;">
                    <option value="">請選擇借用人姓名</option>
                </select>

                <!-- 手動輸入框 (若選擇手動填寫) -->
                <input type="text" id="borrowerInput" placeholder="請輸入姓名" style="display: none; margin-top: 8px;">
            </div>

            <div class="form-group">
                <label for="classroom">借用教室</label>
                <select id="classroom" required>
                    <option value="前小向">前小向</option>
                    <option value="後小向">後小向</option>
                    <option value="向圓">向圓</option>
                    <option value="團輔室">團輔室</option>
                    <option value="前個諮">前個諮</option>
                    <option value="後個諮">後個諮</option>
                    <option value="6F潛能教室">6F潛能教室</option>
                    <option value="6F資藝教室">6F資藝教室</option>
                    <option value="6F Z空間">6F Z空間</option>
                </select>
            </div>

            <div class="form-group">
                <label for="date">預約日期</label>
                <input type="date" id="date" required>
            </div>

            <div class="form-group">
                <label>預約節次 (可多選)</label>
                <div class="checkbox-group" id="periodCheckboxes"></div>
            </div>

            <button type="submit" class="btn-submit">確認登記預約</button>
        </form>
    </div>

    <!-- 右側：即時地圖看板 -->
    <div class="panel">
        <h2>教室動態即時看板</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input type="date" id="mapDate">
            <input type="time" id="mapTime">
        </div>

        <div class="map-grid" id="mapGrid">
            <!-- 動態渲染教室卡片 -->
        </div>
    </div>
</div>

<script>
    // 預設資料設定
    const teachers = ["王大明", "李小華", "張老師", "陳老師", "林老師", "黃老師", "趙老師", "周老師", "吳老師", "徐老師", "孫老師", "馬老師", "朱老師", "胡老師", "郭老師", "手動輸入..."];
    
    const periodsConfig = [
        { name: "第一節", start: "08:10", end: "09:00" },
        { name: "第二節", start: "09:10", end: "10:00" },
        { name: "第三節", start: "10:10", end: "11:00" },
        { name: "第四節", start: "11:10", end: "12:00" },
        { name: "第五節", start: "13:10", end: "14:00" },
        { name: "第六節", start: "14:10", end: "15:05" },
        { name: "第七節", start: "15:25", end: "16:15" },
        { name: "第八節", start: "16:25", end: "17:15" }
    ];

    const rooms = ['前小向', '後小向', '向圓', '團輔室', '前個諮', '後個諮', '6F潛能教室', '6F資藝教室', '6F Z空間'];
    
    // 模擬已存在的預約資料
    let bookings = [];
    let selectedBorrowerValue = "";
    const GAS_URL = ""; // AppScript 後端 URL (如有)

    // 初始化頁面
    window.onload = function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date').value = today;
        document.getElementById('mapDate').value = today;
        
        const now = new Date();
        const currentTimeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        document.getElementById('mapTime').value = currentTimeStr;

        initBorrowerDropdown();
        initPeriodCheckboxes();
        renderMapCards();
        updateDashboard();

        // 監聽時間與日期變更以更新動態看板
        document.getElementById('mapDate').addEventListener('change', updateDashboard);
        document.getElementById('mapTime').addEventListener('change', updateDashboard);
    };

    // 初始化借用人下拉選單
    function initBorrowerDropdown() {
        const customMenu = document.getElementById('customDropdownMenu');
        const customBtn = document.getElementById('customDropdownBtn');
        const customText = document.getElementById('customDropdownText');
        const mobileSelect = document.getElementById('borrowerSelect');
        const inputElem = document.getElementById('borrowerInput');

        teachers.forEach(teacher => {
            // 電腦版選單項目
            const item = document.createElement('div');
            item.className = 'dropdown-item';
            item.textContent = teacher;
            item.onclick = function() {
                if (teacher === "手動輸入...") {
                    selectedBorrowerValue = "__CUSTOM__";
                    customText.textContent = "手動輸入...";
                    inputElem.style.display = "block";
                    inputElem.focus();
                } else {
                    selectedBorrowerValue = teacher;
                    customText.textContent = teacher;
                    customText.style.color = "var(--text-dark)";
                    inputElem.style.display = "none";
                }
                customMenu.classList.remove('show');
            };
            customMenu.appendChild(item);

            // 手機版選單項目
            const opt = document.createElement('option');
            opt.value = teacher === "手動輸入..." ? "__CUSTOM__" : teacher;
            opt.textContent = teacher;
            mobileSelect.appendChild(opt);
        });

        // 按鈕點擊展開與定位
        customBtn.onclick = function(e) {
            e.stopPropagation();
            const rect = customBtn.getBoundingClientRect();
            customMenu.style.top = `${rect.bottom + 4}px`;
            customMenu.style.left = `${rect.left}px`;
            customMenu.style.width = `${rect.width}px`;
            customMenu.classList.toggle('show');
        };

        document.addEventListener('click', function(e) {
            if (!customBtn.contains(e.target) && !customMenu.contains(e.target)) {
                customMenu.classList.remove('show');
            }
        });
    }

    // 初始化時段核取方塊
    function initPeriodCheckboxes() {
        const container = document.getElementById('periodCheckboxes');
        periodsConfig.forEach(p => {
            const label = document.createElement('label');
            label.className = 'checkbox-label';
            label.innerHTML = `<input type="checkbox" name="period" value="${p.name}"> ${p.name}`;
            container.appendChild(label);
        });
    }

    // 渲染地圖基礎卡片結構
    function renderMapCards() {
        const grid = document.getElementById('mapGrid');
        grid.innerHTML = "";
        rooms.forEach(room => {
            const elementId = room === '6F Z空間' ? '6F_Z空間' : room;
            const isVertical = (room === '向圓' || room === '團輔室');
            const card = document.createElement('div');
            card.id = `map-${elementId}`;
            card.className = isVertical ? 'room-card span-vertical available' : 'room-card available';
            card.innerHTML = `
                <div>
                    <div class="room-name">${room}</div>
                    <span class="status-badge">空堂</span>
                </div>
                <div id="info-${elementId}"></div>
            `;
            grid.appendChild(card);
        });
    }

    // 取得當前時間對應的節次名稱
    function getCurrentPeriod(time) {
        const found = periodsConfig.find(p => time >= p.start && time <= p.end);
        if (found) return found.name;
        return "";
    }

    // 💡 關鍵修復與優化：動態看板核心更新邏輯
    function updateDashboard() {
        const date = document.getElementById('mapDate').value;
        const time = document.getElementById('mapTime').value;
        
        let currentPeriodIdx = periodsConfig.findIndex(p => time >= p.start && time <= p.end);
        let isBreakTime = false;

        // 若不在上課時段內，代表處於下課時間
        if (currentPeriodIdx === -1) {
            isBreakTime = true;
            currentPeriodIdx = periodsConfig.findIndex(p => time < p.start);
            if (currentPeriodIdx === -1) currentPeriodIdx = periodsConfig.length;
        }

        const currentP = getCurrentPeriod(time);

        rooms.forEach(room => {
            const elementId = room === '6F Z空間' ? '6F_Z空間' : room;
            const card = document.getElementById(`map-${elementId}`);
            if (!card) return;
            const info = document.getElementById(`info-${elementId}`);
            const badge = card.querySelector('.status-badge');
            
            const roomBookings = bookings.filter(b => b.classroom === room && b.date === date);
            const isVertical = (room === '向圓' || room === '團輔室');

            // 重置動態 class 與屬性
            if (badge) {
                badge.className = "status-badge";
                badge.style.backgroundColor = "";
            }

            // 💡 17:25 之後正式放學，自動恢復為綠色空堂
            if (time >= "17:25") {
                card.className = isVertical ? 'room-card span-vertical available' : 'room-card available';
                badge.textContent = "空堂";
                info.innerHTML = `<div style="font-size:12px;color:#94a3b8;margin-top:5px;font-weight:500;text-align: center;">今日課程已結束 🟢</div>`;
                return;
            }

            // 🟢 情境 A：正在上課時間內
            if (!isBreakTime && currentP) {
                const isOccupiedNow = roomBookings.some(b => b.periods.includes(currentP));
                if (isOccupiedNow) {
                    const b = roomBookings.find(b => b.periods.includes(currentP));
                    card.className = isVertical ? 'room-card span-vertical occupied' : 'room-card occupied';
                    badge.textContent = "使用中";
                    info.innerHTML = `<div style="font-size:12px;color:var(--text-dark);font-weight:700;margin-top:2px;">👤 借用：${b.borrower}</div>`;
                    return;
                }
            }

            // 🟠 情境 B：在下課時間內 (包含 15:05-15:25, 16:15-16:25 及 17:15-17:25)
            if (isBreakTime && currentPeriodIdx > 0 && currentPeriodIdx <= periodsConfig.length) {
                const prevPeriodObj = periodsConfig[currentPeriodIdx - 1]; 
                const nextPeriodObj = periodsConfig[currentPeriodIdx];     
                
                const prevP = prevPeriodObj ? prevPeriodObj.name : null;
                const nextP = nextPeriodObj ? nextPeriodObj.name : null;

                const prevBooking = prevP ? roomBookings.find(b => b.periods.includes(prevP)) : null;
                const nextBooking = nextP ? roomBookings.find(b => b.periods.includes(nextP)) : null;

                // 1. 上一節有人使用
                if (prevBooking) {
                    // (a) 上下一節【同一位老師】 -> 🔴 紅燈：連堂中 (靜態紅)
                    if (nextBooking && prevBooking.borrower === nextBooking.borrower) {
                        card.className = isVertical ? 'room-card span-vertical occupied' : 'room-card occupied';
                        badge.textContent = "連堂中";
                        info.innerHTML = `<div style="font-size:12px;color:var(--text-dark);font-weight:700;margin-top:2px;">👤 借用：${prevBooking.borrower}</div>`;
                        return;
                    }

                    // (b) 上下一節【不同老師】 -> 🔴 紅燈閃爍：交接中 (下節有人)
                    if (nextBooking && prevBooking.borrower !== nextBooking.borrower) {
                        card.className = isVertical ? 'room-card span-vertical occupied' : 'room-card occupied';
                        badge.textContent = "交接中 (下節有人)";
                        badge.classList.add('badge-flashing'); // 觸發動態閃爍

                        info.innerHTML = `
                            <div style="font-size:11px;color:#e06666;font-weight:700;margin-top:2px;">⚠️ 前課：${prevBooking.borrower}</div>
                            <div style="font-size:11px;color:var(--palette-teal);font-weight:700;margin-top:1px;">➡️ 下課：${nextBooking.borrower}</div>
                        `;
                        return;
                    }

                    // (c) 上一節有人，下一節【完全無人】 -> 🟠 橘燈：收拾中 (下節空)
                    card.className = isVertical ? 'room-card span-vertical clearing' : 'room-card clearing';
                    badge.textContent = "收拾中 (下節空)";
                    badge.style.backgroundColor = "#f97316";

                    info.innerHTML = `
                        <div style="font-size:11px;color:#e06666;font-weight:700;margin-top:2px;">⚠️ 前課：${prevBooking.borrower} 收拾中</div>
                        <div style="font-size:11px;color:#166534;font-weight:700;margin-top:1px;">✨ 下一節：🟢 空堂可借</div>
                    `;
                    return;
                }
                
                // 2. 上一節無人，下一節【有人】 -> 🔴 紅燈：準備中 (下節有人)
                if (!prevBooking && nextBooking) {
                    card.className = isVertical ? 'room-card span-vertical occupied' : 'room-card occupied';
                    badge.textContent = "準備中 (下節有人)";
                    info.innerHTML = `<div style="font-size:12px;color:var(--text-dark);font-weight:700;margin-top:2px;">👤 下節借用：${nextBooking.borrower} (${nextP})</div>`;
                    return;
                }
            }

            // ⚪ 情境 C：完全空堂 -> 🟢 綠燈
            card.className = isVertical ? 'room-card span-vertical available' : 'room-card available';
            badge.textContent = "空堂";
            info.innerHTML = `<div style="font-size:12px;color:#94a3b8;margin-top:5px;font-weight:500;text-align: center;">今日後續全空堂 🟢</div>`;
        });
    }

    // 💡 關鍵修復：未選擇借用人時自動聚焦並展開選單
    document.getElementById('bookingForm').onsubmit = function(e) {
        e.preventDefault();
        
        const inputElem = document.getElementById('borrowerInput');
        let borrower = selectedBorrowerValue;
        
        if (borrower === '__CUSTOM__') {
            borrower = inputElem.value.trim();
        }

        // 未選借用人提示與自動 Focus
        if (!borrower) { 
            alert('請選擇或輸入借用人姓名！'); 
            
            const isMobile = window.innerWidth <= 768;
            if (isMobile) {
                const selectElem = document.getElementById('borrowerSelect');
                selectElem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                selectElem.focus();
            } else {
                const btnElem = document.getElementById('customDropdownBtn');
                btnElem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                btnElem.focus();
                
                const menu = document.getElementById('customDropdownMenu');
                if (menu && !menu.classList.contains('show')) {
                    btnElem.click();
                }
            }
            return; 
        }

        const classroom = document.getElementById('classroom').value;
        const date = document.getElementById('date').value;
        const selectedPeriods = Array.from(document.querySelectorAll('input[name="period"]:checked')).map(cb => cb.value);

        if(selectedPeriods.length === 0) { 
            alert('請至少選擇一個借用時段節次！'); 
            return; 
        }

        // 預約衝突檢查
        const hasConflict = bookings.some(b => 
            b.classroom === classroom && b.date === date && 
            b.periods.some(p => selectedPeriods.includes(p))
        );

        if(hasConflict) { 
            alert('❌ 預約衝突！此時段已被其他老師先一步借走囉！'); 
            return; 
        }

        // 新增預約資料
        bookings.push({
            id: Date.now(),
            borrower,
            classroom,
            date,
            periods: selectedPeriods
        });

        // 重置表單狀態
        document.getElementById('bookingForm').reset();
        document.getElementById('borrowerInput').style.display = 'none';
        
        const textElem = document.getElementById('customDropdownText');
        textElem.textContent = '請選擇借用人姓名';
        textElem.style.color = '#94a3b8';
        selectedBorrowerValue = "";

        document.getElementById('date').value = document.getElementById('mapDate').value;
